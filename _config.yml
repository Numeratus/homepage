      Zusätzlich zu meiner klinischen Expertise verbinde ich medizinisches Fachwissen mit datengetriebenen und technischen Fähigkeiten:

      - **Data Science & Analytics:** Python (Pandas, Scikit-Learn), SQL, Tableau, Datenaufbereitung, Machine Learning Grundlagen.
      - **Health IT & Digitalisierung:** KIS Key-User, digitale Pflegedokumentation, Prozessoptimierung, First-Level-IT-Support, Health Informatics.
      - **Klinische Expertise:** Examinierter Pflegefachmann, Praxisanleitung, Wundmanagement, interdisziplinäre Kommunikation.
      - **IT-Infrastruktur & Management:** Grundlagen IT-Support, Cybersecurity, Projektmanagement.
