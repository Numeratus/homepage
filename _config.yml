# About Section
about_title: Über mich
about_profile_image: images/profile.jpg
about_content: |
  Als examinierte Pflegefachkraft und Erfahrung in der hochkomplexen septischen Unfallchirurgie kenne ich die Herausforderungen des klinischen Alltags aus erster Hand. In meiner Rolle als Digitalisierungsbeauftragter und Krankenhausinformationssystem (KIS) Key-User habe ich meine Leidenschaft dafür entdeckt, die Lücke zwischen medizinischer Praxis und Informationstechnologie zu schließen. Ich weiß genau, wie Gesundheitsdaten unter Zeitdruck auf der Station entstehen und kenne die entscheidende Bedeutung von Datenqualität.

  Um dieses Wissen technisch nutzbar zu machen, habe ich mir durch gezielte Online-Kurse (u.a. das Google Advanced Data Analytics Certificate und Harvard CS50) praxisnahe Grundlagen in der Datenanalyse und Programmierung erarbeitet. Heute verbinde ich mein klinisches Fundament mit diesen autodidaktisch erlernten Fähigkeiten in SQL, Python und Tableau. Mein Ziel ist es, reale klinische Daten in klare Erkenntnisse zu übersetzen, um digitale Workflows zu optimieren, die Patientensicherheit zu erhöhen und das medizinische Personal spürbar zu entlasten.

content:
  - title: Projekte # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: Hospital Readmission Dashboard
        link: github.com/Numeratus/readmission-analysis
        icon: fab fa-github
        quote: >
          Analyse von Patienten-Wiederaufnahmeraten zur Identifizierung klinischer Engpässe.
        description: |
          Entwicklung einer End-to-End Analytics-Pipeline zur Identifizierung von ungeplanten 30-Tage-Wiederaufnahmen auf Basis des MIMIC-III-Datensatzes. Durch die Verknüpfung von klinischen Patientendaten mit DRG-Fallpauschalen (Billing) zeigt dieses Projekt, wie klinische Expertise genutzt wird, um finanzielle Risiken zu minimieren und das Entlassmanagement gezielt zu steuern. Implementiert mittels komplexer SQL-Logik (Window Functions) und interaktiver Visualisierung in Tableau.

      - layout: top-middle
        title: Medical No-Show Predictor
        link: github.com/Numeratus/noshow-prediction
        icon: fab fa-github
        quote: >
          Machine-Learning-Modell zur Optimierung der Ressourcenplanung und Reduzierung von Leerläufen.
        description: |
          Entwicklung einer Machine-Learning-Pipeline zur Analyse klinischer und logistischer Determinanten (z.B. Terminvorlaufzeit). Das Modell berechnet individuelle Ausfallwahrscheinlichkeiten von Patienten und ermöglicht datenbasierte Interventionen (wie zielgerichtete SMS-Erinnerungen), um die Effizienz der Terminplanung signifikant zu steigern.
      
      - layout: top-middle
        title: NordBridge - HL7 to FHIR Pipeline
        link: github.com/Numeratus/nordbridge
        icon: fab fa-github
        quote: >
          Interoperabilitäts-Engine zur Echtzeit-Transformation von klinischen HL7-Daten in moderne FHIR-R4-Ressourcen.
        description: |
          Entwicklung einer End-to-End Integrations-Middleware mit Mirth Connect, die die Lücke zwischen Legacy-Krankenhaussystemen (ADT/HIS) und modernen Cloud-Plattformen schließt. Das Projekt demonstriert die Echtzeit-Verarbeitung von HL7 v2 Nachrichten über das MLLP-Protokoll und deren Transformation in FHIR R4 Ressourcen. Ergänzt wird die Pipeline durch ein interaktives Python/Streamlit-Dashboard, das klinische Daten direkt von einem HAPI-FHIR-Server visualisiert.
